<svg width="740px" height="308px" xmlns="http://www.w3.org/2000/svg">
  <style>
    .fg { fill: #AAAAAA }
    .bg { fill: #000000 }
    .fg-bright-blue { fill: #5555FF }
    .fg-bright-cyan { fill: #55FFFF }
    .fg-bright-green { fill: #55FF55 }
    .fg-bright-yellow { fill: #FFFF55 }
    .container {
      padding: 0 10px;
      line-height: 18px;
    }
    .bold { font-weight: bold; }
    tspan {
      font: 14px SFMono-Regular, Consolas, Liberation Mono, Menlo, monospace;
      white-space: pre;
      line-height: 18px;
    }
  </style>

  <rect width="100%" height="100%" y="0" rx="4.5" class="bg" />

  <text xml:space="preserve" class="container fg">
    <tspan x="10px" y="28px"><tspan class="fg-bright-yellow">warning[</tspan><tspan class="fg-bright-yellow"><a href="https://github.com/0x2a-42/yutu/blob/main/lints.md#error-prone-negation">error-prone-negation</a></tspan><tspan class="fg-bright-yellow">]</tspan><tspan class="bold">: negation is executed before relational operator</tspan>
</tspan>
    <tspan x="10px" y="46px"><tspan> </tspan><tspan class="fg-bright-blue bold">--&gt; </tspan><tspan>tests/diagnostics/error_prone_negation.lua:1:5</tspan>
</tspan>
    <tspan x="10px" y="64px"><tspan>  </tspan><tspan class="fg-bright-blue bold">|</tspan>
</tspan>
    <tspan x="10px" y="82px"><tspan class="fg-bright-blue bold">1</tspan><tspan> </tspan><tspan class="fg-bright-blue bold">|</tspan><tspan> X = not A &lt; B</tspan>
</tspan>
    <tspan x="10px" y="100px"><tspan>  </tspan><tspan class="fg-bright-blue bold">|</tspan><tspan>     </tspan><tspan class="fg-bright-yellow">^^^^^</tspan><tspan> </tspan><tspan class="fg-bright-blue bold">-</tspan><tspan> </tspan><tspan class="fg-bright-blue bold">for this relational operator</tspan>
</tspan>
    <tspan x="10px" y="118px"><tspan>  </tspan><tspan class="fg-bright-blue bold">|</tspan>
</tspan>
    <tspan x="10px" y="136px"><tspan class="fg-bright-cyan bold">help</tspan><tspan>: use parentheses to clarify your intent</tspan>
</tspan>
    <tspan x="10px" y="154px"><tspan>  </tspan><tspan class="fg-bright-blue bold">|</tspan>
</tspan>
    <tspan x="10px" y="172px"><tspan class="fg-bright-blue bold">1</tspan><tspan> </tspan><tspan class="fg-bright-blue bold">| </tspan><tspan>X = </tspan><tspan class="fg-bright-green">(</tspan><tspan>not A</tspan><tspan class="fg-bright-green">)</tspan><tspan> &lt; B</tspan>
</tspan>
    <tspan x="10px" y="190px"><tspan>  </tspan><tspan class="fg-bright-blue bold">|</tspan><tspan>     </tspan><tspan class="fg-bright-green">+</tspan><tspan>     </tspan><tspan class="fg-bright-green">+</tspan>
</tspan>
    <tspan x="10px" y="208px"><tspan class="fg-bright-cyan bold">help</tspan><tspan>: invert the result of the relational operation</tspan>
</tspan>
    <tspan x="10px" y="226px"><tspan>  </tspan><tspan class="fg-bright-blue bold">|</tspan>
</tspan>
    <tspan x="10px" y="244px"><tspan class="fg-bright-blue bold">1</tspan><tspan> </tspan><tspan class="fg-bright-blue bold">| </tspan><tspan>X = not </tspan><tspan class="fg-bright-green">(</tspan><tspan>A &lt; B</tspan><tspan class="fg-bright-green">)</tspan>
</tspan>
    <tspan x="10px" y="262px"><tspan>  </tspan><tspan class="fg-bright-blue bold">|</tspan><tspan>         </tspan><tspan class="fg-bright-green">+</tspan><tspan>     </tspan><tspan class="fg-bright-green">+</tspan>
</tspan>
    <tspan x="10px" y="280px">
</tspan>
    <tspan x="10px" y="298px">
</tspan>
  </text>

</svg>
