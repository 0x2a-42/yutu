</tspan>
    <tspan x="10px" y="316px"><tspan>  </tspan><tspan class="fg-bright-blue bold">|</tspan><tspan> </tspan><tspan class="fg-bright-green bold">^^^^^^^^^^^</tspan><tspan> </tspan><tspan class="fg-bright-green bold">however label is followed by this statement</tspan>
</tspan>
    <tspan x="10px" y="334px">
</tspan>
